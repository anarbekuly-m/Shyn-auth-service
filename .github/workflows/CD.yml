name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:

  deploy:

    runs-on: self-hosted

    steps:
      - name: Pull Docker image
        run: sudo  docker pull anarbekulym/auth-service:latest
      - name: Delete Old docker container
        run: sudo docker rm -f auth-service-container || true
      - name: Run Docker Container
        run: sudo docker run -d -p 8080:8080 --name auth-service-container anarbekulym/auth-service:latest