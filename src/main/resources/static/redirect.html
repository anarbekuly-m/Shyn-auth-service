<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Shyn</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .btn { padding: 15px 30px; background: #4CAF50; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>
<div style="text-align: center;">
    <h2>Почти готово!</h2>
    <p>Нажмите кнопку ниже, чтобы вернуться в приложение</p>
    <br>
    <a id="deepLinkBtn" href="#" class="btn">ВЕРНУТЬСЯ В SHYN</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        const link = "shynapp://login-callback?token=" + token;
        document.getElementById('deepLinkBtn').href = link;

        // Пытаемся автоматически, но если Safari заблокирует — кнопка спасет
        window.location.href = link;
    }
</script>
</body>
</html>
