spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hiking_db   # если Docker 5432
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update       # чтобы JPA создал таблицы автоматически
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect