version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: hiking_postgres
    environment:
      POSTGRES_DB: hiking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build: .
    container_name: auth-service-container
    ports:
      - "8080:8080"  # локально внутри EC2, проксировать через nginx
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://hiking_postgres:5432/hiking_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SERVER_ADDRESS: 0.0.0.0
      SPRING_SECURITY_USER_NAME: ""
      SPRING_SECURITY_USER_PASSWORD: ""
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "80:80"       # публичный порт EC2
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service

volumes:
  postgres_data: