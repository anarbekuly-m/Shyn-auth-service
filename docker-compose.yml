version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hiking_postgres
    environment:
      POSTGRES_DB: hiking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: